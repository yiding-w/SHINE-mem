hypernet:
  ckpt_dir: ${oc.env:HOME}/huggingfacemodels/SHINE-ift_mqa_1qa
  backbone: ${oc.env:HOME}/huggingfacemodels/Qwen3-8B
  lora_r: 8
  metalora_r: 128

# BIG-Bench Hard — in-parameter few-shot.
#
# Context = K demos from a single BBH task (compiled into the LoRA by
# SHINE). Question = a different held-out query from the SAME task.
# Reward = exact-match-via-F1 on the short BBH target ("(A)" / "Yes" /
# sorted word list / ...). The LoRA has to encode "which task this is"
# and "how to solve it" — neither demos nor answers leak into the prompt.

data:
  name: bbh
  # All optional — see meta_past/data/bbh_contexts.py for defaults.
  # K_max: 16
  # ctx_token_budget: 900
  # train_frac: 0.8
  # seed: 42

vllm:
  max_loras: 8
  max_lora_rank: 8
  max_model_len: 2048
  dtype: bfloat16
  gpu_memory_utilization: 0.30
  enforce_eager: false

rl:
  adv_kind: grpo
  norm_adv_by_std: true
  loss_agg_mode: token-mean

rollout:
  # context budget matches bbh_contexts ctx_token_budget=900 + tokenizer overhead
  context_max_length: 1024
  # BBH queries can be long (word_sorting, tracking_shuffled_seven_objects
  # hit ~430 tokens after chat-template wrapping). Give plenty of margin.
  question_max_length: 512
  # word_sorting target can be 20 sorted words (~60 tokens). 128 leaves
  # headroom for direct answers. SHINE-pretrained Qwen3 was SFT'd entirely
  # on non-thinking data, so it does not emit <think> in practice even with
  # enable_thinking=true (which is now the standard) — the stub is not
  # needed to police the budget. Raise this if you turn on force_think.
  max_new_tokens: 128
  temperature: 1.0
  contexts_per_step: 64          # B; with world_size=8 → B_local=8 ctx/rank
  questions_per_context: 1       # bbh has one query per built context
  rollouts_per_question: 16      # K → B*Q*K = 1024 samples/step
  hypernet_microbatch_contexts: 2
  rescore_microbatch_contexts: 1
  # Stock Qwen3 template: true = no stub, model decides whether to emit
  # <think>. SHINE-pretrained Qwen3 was SFT'd on non-thinking data, so in
  # practice it just emits the answer directly. If you ever want to actually
  # train thinking on BBH, set force_think=true AND bump max_new_tokens.
  enable_thinking: true
  force_think: false

optim:
  lr: 1.0e-5
  weight_decay: 0.0
  grad_clip: 1.0
  use_gradient_checkpointing: true

# F1 reward works for BBH because targets are short strings ("(A)", "Yes",
# sorted word lists) and the F1 normalizer (lowercase, strip punctuation)
# folds "(A)" -> "a". Predicted answers that wrap the letter in noise still
# score the right token via F1 partial credit.
reward:
  type: f1

train:
  total_steps: 500
  eval_every: 25
  heldout_contexts: 256          # fixed eval slice (user spec)
  save_every: 50
  seed: 42
  out_dir: runs/bbh_grpo
  # 0 = entire training half across all 27 tasks (~5200 contexts).
  train_contexts: 0

wandb:
  enabled: true
  project: meta-past-rl
  name: bbh_grpo
  tags: ["grpo", "qwen3-8b", "ddp", "hybrid", "bbh", "few-shot"]
  notes: "BBH in-parameter few-shot, K demos -> LoRA -> direct answer"
  mode: online
  group: ""
