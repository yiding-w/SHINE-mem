hypernet:
  ckpt_dir: ${oc.env:HOME}/huggingfacemodels/SHINE-ift_mqa_1qa
  backbone: ${oc.env:HOME}/huggingfacemodels/Qwen3-8B
  lora_r: 8
  metalora_r: 128

# MuSiQue (multi-hop QA), supporting paragraphs only — F1 reward.
#
# **Thinking variant** of rl_musique_grpo.yaml: rollout prompts are
# prefilled with "<think>\n" via force_think; the model must produce
# multi-hop reasoning then close </think> before the answer span.
# max_new_tokens raised 64 → 512 to fit reasoning + answer.
#
# Multi-hop is the most natural place to expect a thinking lift —
# 2-3 hops require chaining intermediate facts, so a working <think>
# block could meaningfully outperform direct extraction. Cold-start
# from SHINE-orig will still be slow (no thinking SFT), so expect a
# longer warmup than the non-thinking baseline.

data:
  name: musique

vllm:
  max_loras: 8
  max_lora_rank: 8
  max_model_len: 2048
  dtype: bfloat16
  gpu_memory_utilization: 0.30
  enforce_eager: false

rl:
  adv_kind: grpo
  norm_adv_by_std: true
  loss_agg_mode: token-mean

rollout:
  context_max_length: 1024
  question_max_length: 256
  # 512 = ~400 tokens multi-hop reasoning + closing tag + ~60 token
  # answer span. Step time scales ~linearly so expect ~8x slowdown vs.
  # the non-thinking baseline (per-step rollout time, not training time).
  max_new_tokens: 512
  temperature: 1.0
  contexts_per_step: 16          # B; with world_size=8 → B_local=2 ctx/rank
  questions_per_context: 1
  rollouts_per_question: 16      # K → B*Q*K = 256 samples/step
  hypernet_microbatch_contexts: 2
  rescore_microbatch_contexts: 2
  enable_thinking: true
  # Prefill "<think>\n" so the model is forced into the thinking branch.
  force_think: true

optim:
  lr: 1.0e-5
  weight_decay: 0.0
  grad_clip: 1.0
  use_gradient_checkpointing: true

reward:
  type: f1

train:
  total_steps: 500
  eval_every: 25
  heldout_contexts: 256
  save_every: 50
  seed: 42
  out_dir: runs/musique_grpo_think
  train_contexts: 0

wandb:
  enabled: true
  project: meta-past-rl
  name: musique_grpo_think
  tags: ["grpo", "qwen3-8b", "ddp", "hybrid", "musique", "thinking"]
  notes: "MuSiQue F1 with force_think — multi-hop chain-of-thought before answer"
  mode: online
  group: ""
