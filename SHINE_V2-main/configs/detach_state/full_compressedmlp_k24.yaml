# DetachState configuration — Full mode with CompressedMLP w_transform
# Same as full.yaml but with w_transform_context set to compressed_mlp.
#
# The wdict batch dimension equals local_batch_size. Each PP stage stores
# only the wdict for its own layers. Write uses baddbmm to fuse the
# A@B computation and accumulation into a single operation.
#
# NOTE: local_batch_size, micro_batch_size, and parallelism topology are
# NOT configured here. They are automatically read from the training config
# and pipeline topology at initialization time, and stored internally for
# checkpoint validation.

type: full

# Weight regularization coefficient.
# Loss term: regu_c * || W_old + A@B ||_F^2
# Set to 0.0 to disable. Recommended range: 1e-5 ~ 1e-3.
regu_c: 0.0001

# Per-batch-position reset threshold.
# Before each read, if the squared Frobenius norm ||W[batch_slice]||² of a
# batch position exceeds this threshold, that slice is reset to zero.
# The norm is computed as the SUM across all pipeline stages (all layers)
# for that batch position.
# Set to null to disable threshold-based reset (never reset).
# Set to <= 0 to reset every step unconditionally.
reset_threshold: 1.0

# W-transform for Phase A (context forward with detach_state wdict).
# Uses compressed_mlp to learn a transform that bridges the objective mismatch.
w_transform_context:
  method: compressed_mlp
  k: 24
  mlp_ratio: 2 # 4
  activation: gelu
  # --- Enhancement B: Asymmetric Bases ---
  # Use separate L_dec/R_dec for decompression (different from L/R used for compression).
  # Allows compress and decompress directions to be independently optimized.
  asymmetric: true
  # --- Enhancement E: FiLM Conditioning ---
  # Modulate the compressed z with global statistics of W before MLP.
  # Stats are log1p-normalized for numerical stability (compresses large values
  # like norm~100 to ~4.6, preventing FiLM net from receiving extreme inputs).
  # Options: "none" (disabled), "film" (scale+shift), "concat" (append to input)
  conditioning: film
  # Which statistics to compute. Options: mean, std, norm, max, min
  cond_stats: [mean, std, norm, max, min]
  # --- Network Architecture (blocks) ---
  # Define the processing blocks between compress and decompress.
  # Each element is either "mlp" or "attn":
  #   - "mlp": A residual MLP block (k² → mlp_ratio*k² → k²), per-projection.
  #   - "attn": A cross-projection attention block (multi-head self-attention
  #             across all projections within the same layer). Requires all
  #             projections' z to be available, so triggers two-pass mode.
  # The first mlp block receives FiLM-modulated input; subsequent mlp blocks
  # receive the previous block's output directly.
  # Examples:
  #   [mlp, attn]           — current default (1 MLP + 1 cross-attn)
  #   [mlp]                 — MLP only, no cross-projection interaction
  #   [mlp, attn, mlp]      — MLP, cross-attn, then another MLP
  #   [mlp, mlp, attn, mlp] — deeper network
  blocks: [mlp, attn]
  # Number of attention heads for "attn" blocks (d_model=k², d_head=k²/num_heads)
  attn_num_heads: 4
  # --- Cross-Layer Parameter Sharing ---
  # Share parameters across different layers for the SAME projection type.
  # e.g. if share_mlp is true, all layers' "q_query" share one MLP,
  # all layers' "k_key" share another MLP, etc.
  # Within the same layer, different projections always have independent params.
  # Set to true to share across layers, false to keep each layer independent.
  share_lr: false        # Share L_enc/R_enc/L_dec/R_dec across layers
  share_mlp: false       # Share MLP across layers
  share_film: false      # Share FiLM conditioning network across layers
  share_attn: false      # Share CrossProjectionAttn across layers

# W-transform for Phase C (conversation forward with detach_state wdict).
# Phase C has no objective mismatch (wdict was trained for this purpose),
# so this remains "identity".
w_transform_conversation:
  method: identity
