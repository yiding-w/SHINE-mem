
# TransformerModel config for Qwen3.6-27B
# Architecture: Qwen3_5 (gated attention, zero-init RMSNorm, all dense MLP layers)

init:
  hidden_size: 5120
  num_hidden_layers: 4
  num_attention_heads: 24
  num_key_value_heads: 4
  head_dim: 256
  attention_bias: false
  attention_dropout: 0.0
  rms_norm_eps: 1.0e-06
  hidden_act: silu
  max_position_embeddings: 2048
  rope_theta: 10000.0
  initializer_range: 0.02

  # Qwen3_5-style architectural choices
  use_gated_attention: true    # sigmoid gate on attention output
  norm_zero_init: true         # RMSNorm with zero-init weight: output = norm(x) * (1 + w)
  prenorm: true # true                # Pre-LN (norm before sublayer)
  last_norm: gated       # "normal" = standard RMSNorm, "gated" = RMSNormGated (with SiLU gate), "none" = no final norm (identity placeholder)

  # Dense MLP configuration (all layers are dense, no MoE)
  layer_is_moe: full           # "moe" = all layers use MoE; "full" = all dense; or a list per layer
  intermediate_size: 17408

  # MoE configuration (unused when all layers are dense, but kept for completeness)
  moe_intermediate_size: 0
  num_experts: 0
  num_experts_per_tok: 0
  norm_topk_prob: true

# LoRA generate method: how A/B matrices are laid out.
#   "rl" = A(in, r), B(r, out)   "rr" = A(in, r), B(out, r)^T
#   "lr" = A(r, in)^T, B(out, r)^T   "ll" = A(r, in)^T, B(r, out)
lora_method: rl

# Memory method: how memory_states (B, L, M, H) are reshaped before m2p_transformer.
#   "only_full_4for1" = (B, L, M, H) → (B, L/4, M*4, H). Merges 4 consecutive layers'
#       memory tokens into one group. L/4 = number of full_attention layers.
#   "only_full_1for1" = (B, L_fa, M, H) → (B, L_fa, M, H). Only takes memory_states
#       from full_attention layers (discards linear_attention layers), no merging.
#       L_fa = number of full_attention layers.
memory_method: only_full_1for1

# Hypernetwork layer types for processing memory_states (B, L, M, H).
# Each entry corresponds to one m2p_transformer layer.
#   "h" = horizontal attention: reshape to (B*L, M, H), attend over M tokens, restore shape.
#   "v" = vertical attention:   transpose to (B, M, L, H), reshape to (B*M, L, H),
#          attend over L tokens, restore shape.
# Length must equal num_hidden_layers.
layer_types: ["h", "v", "h", "h"]

# init_lora_var: variance for metalora random initialization
#   A = randn(...) * sqrt(init_lora_var)
init_lora_var: 0.0001

# generate_lora_scale: scale applied to hypernetwork-generated LoRA
#   A = plain_tensor[...] * sqrt(generate_lora_scale),  B = plain_tensor[...] * sqrt(generate_lora_scale)
generate_lora_scale: 0.000001

# device_map:
#   layer_prefix: "layers"
#   gpu_map:
#     - [7, 0, 7]
#   extra:
#     norm: 7
#     rotary_emb: 7

# device_map:
#   layer_prefix: "layers"
#   gpu_map:
#     - [6, 0, 3]
#     - [7, 4, 7]
#   extra:
#     rotary_emb: 6
#     norm: 7

device_map:
  layer_prefix: "layers"
  gpu_map:
    - [7, 0, 7]
  extra:
    rotary_emb: 7
    norm: 7
