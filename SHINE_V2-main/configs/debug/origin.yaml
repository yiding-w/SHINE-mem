# Debug configuration
anchor_debug: false       # When true, print all backward anchor tensors info in forward_with_grad and pipeline_backward
no_flash: false           # When true, disable SDPA Flash Attention, only SDPA

# All schedule-type debug settings below support three formats:
#   -1          → disabled (never run)
#   N (int > 0) → run every N optimizer steps
#   [a, b, ...] → run at exactly these steps (0 = before training)
log_peak_memory_steps: [0, 1, 5, 10, 100]                       # Report GPU peak memory
log_train_detail_steps: -1                     # Log per-token training detail (tokens, ids, loss)
log_train_detail_ppl_threshold: 100             # Also log training detail when step ppl exceeds this threshold (-1=disabled). Output goes to training_detail_ppl_threshold_node<rank>.log
check_consistency_across_nodes: [0, 1, 10, 100]   # Check DP param consistency across nodes
check_nograd_loradict: -1                             # Check nograd_loradict tensors have no grad/grad_fn (NOT YET IMPLEMENTED — enable after adding nograd_loradict generation)

# ======================== Training Monitor ========================
# Monitor configuration for P0 metrics.
# Each setting is either:
#   - true/false: forced every-step check (for critical metrics)
#   - schedule format (-1, int>0, or list): run at specific steps
monitor:
  # --- Gradient Norm (schedule-based, logged to wandb) ---
  # Records per-layer and total gradient norms (pre/post clipping) for
  # hypernetwork and metalora. Uploaded to wandb.
  grad_norm_steps: 1              # -1=disabled, N=every N steps, [list]=specific steps

  # --- Parameter (Weight) Norm (schedule-based, logged to wandb) ---
  # Records per-layer and total weight norms for hypernetwork and metalora.
  # Lightweight: only local .norm() computation + gather_object.
  param_norm_steps: 1             # -1=disabled, N=every N steps, [list]=specific steps

  # --- Generated LoRA Norm (schedule-based, logged to wandb) ---
  # Records norms of the LoRA parameters generated by the hypernetwork
  # during the last forward pass. Uses cached loradict (no extra forward).
  gen_lora_norm_steps: 1          # -1=disabled, N=every N steps, [list]=specific steps

  # --- Loss Spike Detection (forced every step, true/false) ---
  # Records loss max/min/std across DP replicas and detects spikes.
  # Uploaded to wandb every logging step.
  loss_spike: true                # true=enabled, false=disabled

  # --- NaN/Inf Detection & Skip (forced every step, true/false) ---
  # Checks loss for NaN/Inf. If detected, skips the optimizer step
  # and logs the event frequency to wandb.
  nan_inf_detect: true            # true=enabled, false=disabled

  # --- NaN/Inf Early Stop (integer, -1=disabled) ---
  # If consecutive NaN/Inf skip steps reaches this threshold,
  # terminate all training immediately. -1 means never stop.
  nan_inf_stop_steps: 10          # -1=disabled, N=stop after N consecutive bad steps
