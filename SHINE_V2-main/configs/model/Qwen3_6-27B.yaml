
# Model loading configuration
name: Qwen3_6-27B
path: "./models/Qwen3.6-27B"
base_class: src_transformers.Qwen3_5.Qwen3_5ForCausalLM
lora_class: src_transformers_lora.LoraQwen3_5.LoraQwen3_5ForCausalLM

# Per-component LoRA ranks.
# Each key maps to a specific linear projection in the model.
# Qwen3_5 attention projections:
#   q_query, q_gate  — independent LoRA on the query/gate halves of q_proj
#   k_proj, v_proj, o_proj — standard attention projections
# MLP projections:
#   mlp_gate, mlp_up, mlp_down
lora_ranks:
  q_query: 20
  q_gate: 20
  k_proj: 20
  v_proj: 20
  o_proj: 20
  mlp_gate: 20
  mlp_up: 20
  mlp_down: 20

metalora_ranks:
  q_query: 640
  q_gate: 640
  k_proj: 640
  v_proj: 640
  o_proj: 640
  mlp_gate: 640
  mlp_up: 640
  mlp_down: 640

# metalora_ranks:
#   q_query: 320
#   q_gate: 320
#   k_proj: 320
#   v_proj: 320
#   o_proj: 320
#   mlp_gate: 320
#   mlp_up: 320
#   mlp_down: 320

device_map:
  layer_prefix: "model.layers"
  gpu_map:
    - [0, 0, 10]
    - [1, 11, 19]
    - [2, 20, 28]
    - [3, 29, 37]
    - [4, 38, 46]
    - [5, 47, 55]
    - [6, 56, 63]
  extra:
    model.embed_tokens: 0
    model.norm: 6
    lm_head: 6
