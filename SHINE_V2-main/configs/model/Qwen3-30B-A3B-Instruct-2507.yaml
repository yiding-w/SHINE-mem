# Model loading configuration
name: Qwen3-30B-A3B-Instruct-2507
path: "./models/Qwen3-30B-A3B-Instruct-2507"
base_class: src_transformers.LoraQwen3Moe.Qwen3MoeForCausalLM
lora_class: src_transformers_lora.LoraQwen3Moe.LoraQwen3MoeForCausalLM

# Per-component LoRA ranks.
# Qwen3Moe attention projections:
#   q_proj, k_proj, v_proj, o_proj
# Expert projections (applied to every expert in MoE layers):
#   expert_gate, expert_up, expert_down
# Dense MLP projections (for non-MoE layers):
#   mlp_gate, mlp_up, mlp_down
lora_ranks:
  q_proj: 16
  k_proj: 16
  v_proj: 16
  o_proj: 16
  expert_gate: 16
  expert_up: 16
  expert_down: 16
  mlp_gate: 16
  mlp_up: 16
  mlp_down: 16

metalora_ranks:
  q_proj: 16
  k_proj: 16
  v_proj: 16
  o_proj: 16
  expert_gate: 16
  expert_up: 16
  expert_down: 16
  mlp_gate: 16
  mlp_up: 16
  mlp_down: 16

device_map:
  layer_prefix: "model.layers"
  gpu_map:
    - [0, 0, 5]
    - [1, 6, 11]
    - [2, 12, 17]
    - [3, 18, 23]
    - [4, 24, 29]
    - [5, 30, 35]
    - [6, 36, 41]
    - [7, 42, 47]
  extra:
    model.embed_tokens: 0
    model.norm: 7
    lm_head: 7