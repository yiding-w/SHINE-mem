# Model loading configuration
name: Qwen3_6-35B-A3B
path: "./models/Qwen3_6-35B-A3B"
base_class: src_transformers.LoraQwen3_5Moe.Qwen3_5MoeForCausalLM
lora_class: src_transformers_lora.LoraQwen3_5Moe.LoraQwen3_5MoeForCausalLM

# Per-component LoRA ranks.
# Each key maps to a specific linear projection in the model.
# Qwen3_5Moe attention projections:
#   q_query, q_gate  — independent LoRA on the query/gate halves of q_proj
#   k_proj, v_proj, o_proj — standard attention projections
# Expert projections (applied to every expert):
#   expert_gate, expert_up, expert_down
lora_ranks:
  q_query: 32
  q_gate: 32
  k_proj: 32
  v_proj: 32
  o_proj: 32
  expert_gate: 0
  expert_up: 0
  expert_down: 2

metalora_ranks:
  q_query: 32
  q_gate: 32
  k_proj: 32
  v_proj: 32
  o_proj: 32
  expert_gate: 0
  expert_up: 0
  expert_down: 2

