# Data configuration for oldpretrain dataset
name: oldpretrain
dataset_module: mydatasets.pretrain.oldpretrain    # Python module path for dynamic import
context_seq_length: 1120                # Sequence length for context input
conv_seq_length: 1120                   # Sequence length for conversation input (must == context_seq_length)

# Data source settings
data_path: "old_data/transmla_pretrain_6B_tokens"   # Path to the dataset
data_format: "hf_dataset"              # "hf_dataset", "hf_disk", or "jsonl"

# Tokenization cache settings
cache_dir: "cache/oldpretrain_tokens"  # Directory for tokenized .npz shard files
preprocess_workers: 32                 # Number of parallel workers for tokenization
texts_per_shard: 1000                  # Number of texts per shard file
validation_split_num: 512                     # Validation split size: -1=disabled, int=exact count, float(0~1)=fraction
shuffle: true                          # Whether to shuffle data during training
